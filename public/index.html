<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Functions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Math Functions</h1>

    <div class="card">
      <h2>Add</h2>
      <form id="form-add">
        <div class="inputs">
          <input type="number" name="a" placeholder="a" required>
          <span>+</span>
          <input type="number" name="b" placeholder="b" required>
        </div>
        <button type="submit">Calculate</button>
      </form>
      <div class="result" id="result-add"></div>
    </div>

    <div class="card">
      <h2>Subtract</h2>
      <form id="form-subtract">
        <div class="inputs">
          <input type="number" name="a" placeholder="a" required>
          <span>−</span>
          <input type="number" name="b" placeholder="b" required>
        </div>
        <button type="submit">Calculate</button>
      </form>
      <div class="result" id="result-subtract"></div>
    </div>

    <div class="card">
      <h2>Multiply</h2>
      <form id="form-multiply">
        <div class="inputs">
          <input type="number" name="a" placeholder="a" required>
          <span>×</span>
          <input type="number" name="b" placeholder="b" required>
        </div>
        <button type="submit">Calculate</button>
      </form>
      <div class="result" id="result-multiply"></div>
    </div>

    <div class="card">
      <h2>Square Root</h2>
      <form id="form-sqrt">
        <div class="inputs">
          <span>√</span>
          <input type="number" name="x" placeholder="x" required>
        </div>
        <button type="submit">Calculate</button>
      </form>
      <div class="result" id="result-sqrt"></div>
    </div>

    <div class="card">
      <h2>Factorial</h2>
      <form id="form-factorial">
        <div class="inputs">
          <input type="number" name="n" placeholder="n" min="0" max="170" required>
          <span>!</span>
        </div>
        <button type="submit">Calculate</button>
      </form>
      <div class="result" id="result-factorial"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
